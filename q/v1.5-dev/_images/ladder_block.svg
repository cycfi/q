<svg xmlns="http://www.w3.org/2000/svg" width="780" height="300"
     viewBox="0 0 780 300"
     font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol"' font-size="12">

  <!-- ── output tap label ── -->
  <text x="610" y="46" text-anchor="middle" fill="#1a1a1a">Lowpass</text>
  <line x1="610" y1="120" x2="610" y2="58" stroke="#1565c0" stroke-width="1.4"/>

  <!-- ── input → summer ── -->
  <text x="6" y="125" fill="#1a1a1a">input</text>
  <line x1="40" y1="120" x2="128" y2="120" stroke="#1a1a1a" stroke-width="1.4"/>
  <circle cx="150" cy="120" r="22" fill="#e8f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="150" y="127" text-anchor="middle" fill="#1a1a1a" font-size="18">&#931;</text>

  <!-- ── four one-pole lowpass stages ── -->
  <line x1="172" y1="120" x2="195" y2="120" stroke="#1565c0" stroke-width="1.4"/>
  <rect x="195" y="103" width="85" height="34" rx="8" fill="#e8f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="237" y="119" text-anchor="middle" fill="#1a1a1a">one-pole</text>
  <text x="237" y="131" text-anchor="middle" fill="#5d5d5d" font-size="10">gain g</text>

  <line x1="280" y1="120" x2="295" y2="120" stroke="#1565c0" stroke-width="1.4"/>
  <rect x="295" y="103" width="85" height="34" rx="8" fill="#e8f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="337" y="119" text-anchor="middle" fill="#1a1a1a">one-pole</text>
  <text x="337" y="131" text-anchor="middle" fill="#5d5d5d" font-size="10">gain g</text>

  <line x1="380" y1="120" x2="395" y2="120" stroke="#1565c0" stroke-width="1.4"/>
  <rect x="395" y="103" width="85" height="34" rx="8" fill="#e8f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="437" y="119" text-anchor="middle" fill="#1a1a1a">one-pole</text>
  <text x="437" y="131" text-anchor="middle" fill="#5d5d5d" font-size="10">gain g</text>

  <line x1="480" y1="120" x2="495" y2="120" stroke="#1565c0" stroke-width="1.4"/>
  <rect x="495" y="103" width="85" height="34" rx="8" fill="#e8f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="537" y="119" text-anchor="middle" fill="#1a1a1a">one-pole</text>
  <text x="537" y="131" text-anchor="middle" fill="#5d5d5d" font-size="10">gain g</text>

  <!-- stage 4 → output tap -->
  <line x1="580" y1="120" x2="610" y2="120" stroke="#1565c0" stroke-width="1.4"/>
  <circle cx="610" cy="120" r="3.5" fill="#1565c0"/>

  <!-- ── resonance feedback (amber) ── -->
  <line x1="610" y1="120" x2="610" y2="235" stroke="#b07000" stroke-width="1.4"/>
  <line x1="610" y1="235" x2="420" y2="235" stroke="#b07000" stroke-width="1.4"/>

  <rect x="340" y="218" width="80" height="34" rx="8" fill="#fff8e1" stroke="#b07000" stroke-width="1.5"/>
  <text x="380" y="234" text-anchor="middle" fill="#1a1a1a">&#215; k</text>
  <text x="380" y="246" text-anchor="middle" fill="#5d5d5d" font-size="10">resonance</text>

  <!-- k output → inverter → summer -->
  <line x1="340" y1="235" x2="150" y2="235" stroke="#b07000" stroke-width="1.4"/>
  <line x1="150" y1="235" x2="150" y2="192" stroke="#b07000" stroke-width="1.4"/>
  <polygon points="135,192 165,192 150,162" fill="#fff8e1" stroke="#b07000" stroke-width="1.5"/>
  <text x="150" y="186" text-anchor="middle" fill="#1a1a1a" font-size="11">&#8722;1</text>
  <line x1="150" y1="162" x2="150" y2="142" stroke="#b07000" stroke-width="1.4"/>

  <!-- ── legend + coefficients ── -->
  <line x1="40" y1="282" x2="68" y2="282" stroke="#1565c0" stroke-width="1.4"/>
  <text x="73" y="286" fill="#5d5d5d" font-size="10">signal path</text>
  <line x1="160" y1="282" x2="188" y2="282" stroke="#b07000" stroke-width="1.4"/>
  <text x="193" y="286" fill="#5d5d5d" font-size="10">resonance feedback (optional tanh saturation)</text>
  <text x="560" y="286" fill="#5d5d5d" font-size="10">g = tan(&#960;&#183;fc/fs),  k = 4r</text>

  <!-- baked arrowheads -->
  <polygon points="128,120 119,116 119,124" fill="#1a1a1a"/>
  <polygon points="195,120 186,116 186,124" fill="#1565c0"/>
  <polygon points="295,120 286,116 286,124" fill="#1565c0"/>
  <polygon points="395,120 386,116 386,124" fill="#1565c0"/>
  <polygon points="495,120 486,116 486,124" fill="#1565c0"/>
  <polygon points="610,58 606,67 614,67" fill="#1565c0"/>
  <polygon points="420,235 429,231 429,239" fill="#b07000"/>
  <polygon points="150,142 146,151 154,151" fill="#b07000"/>
</svg>
