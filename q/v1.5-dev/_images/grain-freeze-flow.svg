<svg xmlns="http://www.w3.org/2000/svg" width="720" height="290" viewBox="0 0 720 290" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol"' font-size="12">

  <!-- ====================== audio path (top) ====================== -->
  <text x="10" y="56" fill="#1a1a1a">input</text>

  <rect x="58" y="30" width="120" height="46" rx="8" fill="#e8f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="118" y="49" text-anchor="middle" fill="#1a1a1a">ring buffer</text>
  <text x="118" y="66" text-anchor="middle" fill="#5d5d5d" font-size="10">hermite reads</text>

  <rect x="218" y="30" width="142" height="46" rx="8" fill="#e8f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="289" y="49" text-anchor="middle" fill="#1a1a1a">grains ×2, OLA</text>
  <text x="289" y="66" text-anchor="middle" fill="#5d5d5d" font-size="10">width 4096 · hop 2048</text>

  <rect x="400" y="30" width="120" height="46" rx="8" fill="#e8f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="460" y="49" text-anchor="middle" fill="#1a1a1a">× 0.8 · gain</text>
  <text x="460" y="66" text-anchor="middle" fill="#5d5d5d" font-size="10">hann fade · last 4 s</text>

  <line x1="44" y1="53" x2="56" y2="53" stroke="#1a1a1a" stroke-width="1.4"/>
  <line x1="178" y1="53" x2="216" y2="53" stroke="#1a1a1a" stroke-width="1.4"/>
  <line x1="360" y1="53" x2="398" y2="53" stroke="#1a1a1a" stroke-width="1.4"/>
  <line x1="520" y1="53" x2="556" y2="53" stroke="#1a1a1a" stroke-width="1.4"/>

  <!-- summer -->
  <circle cx="570" cy="53" r="14" fill="white" stroke="#1a1a1a" stroke-width="1.4"/>
  <text x="570" y="58" text-anchor="middle" fill="#1a1a1a" font-size="14">+</text>
  <line x1="584" y1="53" x2="698" y2="53" stroke="#1a1a1a" stroke-width="1.4"/>
  <text x="690" y="44" fill="#1a1a1a">out</text>

  <!-- dry path (dashed) -->
  <path d="M 44 53 L 44 115 L 570 115 L 570 67" fill="none" stroke="#5d5d5d" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="80" y="110" fill="#5d5d5d" font-size="10">dry (passthrough)</text>

  <!-- ====================== control rail (bottom) ====================== -->

  <!-- freeze trigger -->
  <rect x="58" y="190" width="120" height="44" rx="20" fill="#fdeaf2" stroke="#d81b60" stroke-width="1.5"/>
  <text x="118" y="209" text-anchor="middle" fill="#d81b60">freeze at 1.2 s</text>
  <text x="118" y="226" text-anchor="middle" fill="#d81b60" font-size="10">anchor = freeze_pos</text>
  <path d="M 178 212 L 289 212 L 289 78" fill="none" stroke="#d81b60" stroke-width="1.2"/>

  <!-- LFO -->
  <rect x="218" y="190" width="142" height="44" rx="8" fill="#ffffff" stroke="#43a047" stroke-width="1.5"/>
  <text x="289" y="209" text-anchor="middle" fill="#1a1a1a">sin_cos_gen LFO</text>
  <text x="289" y="226" text-anchor="middle" fill="#5d5d5d" font-size="10">0.3 Hz · ±25 ms wander</text>
  <path d="M 289 188 L 289 150 L 260 150 L 260 78" fill="none" stroke="#43a047" stroke-width="1.2"/>

  <!-- jitter -->
  <rect x="218" y="248" width="142" height="34" rx="8" fill="#ffffff" stroke="#43a047" stroke-width="1.5"/>
  <text x="289" y="270" text-anchor="middle" fill="#1a1a1a">jitter ±5 ms</text>
  <path d="M 360 265 L 380 265 L 380 140 L 320 140 L 320 78" fill="none" stroke="#43a047" stroke-width="1.2"/>

  <!-- fade -->
  <rect x="370" y="190" width="180" height="44" rx="8" fill="#ffffff" stroke="#43a047" stroke-width="1.5"/>
  <text x="460" y="209" text-anchor="middle" fill="#1a1a1a">hann_downward_ramp</text>
  <text x="460" y="226" text-anchor="middle" fill="#5d5d5d" font-size="10">4 s tail fade</text>
  <line x1="460" y1="188" x2="460" y2="78" stroke="#43a047" stroke-width="1.2"/>

  <!-- baked arrowheads -->
  <polygon points="56.00,53.00 47.00,57.00 47.00,49.00" fill="#1a1a1a"/>
  <polygon points="216.00,53.00 207.00,57.00 207.00,49.00" fill="#1a1a1a"/>
  <polygon points="398.00,53.00 389.00,57.00 389.00,49.00" fill="#1a1a1a"/>
  <polygon points="556.00,53.00 547.00,57.00 547.00,49.00" fill="#1a1a1a"/>
  <polygon points="698.00,53.00 689.00,57.00 689.00,49.00" fill="#1a1a1a"/>
  <polygon points="460.00,78.00 464.00,87.00 456.00,87.00" fill="#43a047"/>
  <polygon points="570.00,67.00 574.00,76.00 566.00,76.00" fill="#5d5d5d"/>
  <polygon points="289.00,78.00 293.00,87.00 285.00,87.00" fill="#d81b60"/>
  <polygon points="260.00,78.00 264.00,87.00 256.00,87.00" fill="#43a047"/>
  <polygon points="320.00,78.00 324.00,87.00 316.00,87.00" fill="#43a047"/>
</svg>
