<svg xmlns="http://www.w3.org/2000/svg" width="890" height="290"
     viewBox="0 0 890 290"
     font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol"' font-size="12">

  <!-- ── MIDI note event (trigger) ── -->
  <rect x="14" y="126" width="96" height="44" rx="20" fill="#fdeaf2" stroke="#d81b60" stroke-width="1.5"/>
  <text x="62" y="145" text-anchor="middle" fill="#d81b60">MIDI</text>
  <text x="62" y="160" text-anchor="middle" fill="#d81b60" font-size="11">note on/off</text>
  <line x1="110" y1="148" x2="140" y2="148" stroke="#d81b60" stroke-width="1.4"/>

  <!-- ── voice allocator (control) ── -->
  <rect x="140" y="130" width="160" height="36" rx="8" fill="#ffffff" stroke="#43a047" stroke-width="1.5"/>
  <text x="220" y="146" text-anchor="middle" fill="#1a1a1a">voice allocator</text>
  <text x="220" y="159" text-anchor="middle" fill="#5d5d5d" font-size="10">free, else steal oldest</text>
  <line x1="300" y1="148" x2="340" y2="148" stroke="#43a047" stroke-width="1.4"/>

  <!-- ── voice pool ── -->
  <rect x="340" y="40" width="220" height="218" rx="10" fill="#e8f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="450" y="58" text-anchor="middle" fill="#1a1a1a">voice pool (&#215;16)</text>

  <rect x="356" y="70" width="188" height="34" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.4"/>
  <text x="450" y="86" text-anchor="middle" fill="#1a1a1a">voice 1</text>
  <text x="450" y="98" text-anchor="middle" fill="#5d5d5d" font-size="10">saw &#8594; svf &#8594; ADSR</text>

  <rect x="356" y="114" width="188" height="34" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.4"/>
  <text x="450" y="130" text-anchor="middle" fill="#1a1a1a">voice 2</text>
  <text x="450" y="142" text-anchor="middle" fill="#5d5d5d" font-size="10">saw &#8594; svf &#8594; ADSR</text>

  <text x="450" y="172" text-anchor="middle" fill="#5d5d5d" font-size="16">&#8942;</text>

  <rect x="356" y="190" width="188" height="34" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.4"/>
  <text x="450" y="206" text-anchor="middle" fill="#1a1a1a">voice 16</text>
  <text x="450" y="218" text-anchor="middle" fill="#5d5d5d" font-size="10">saw &#8594; svf &#8594; ADSR</text>

  <!-- ── mix → gain/clip → output ── -->
  <line x1="560" y1="148" x2="598" y2="148" stroke="#1565c0" stroke-width="1.4"/>
  <circle cx="620" cy="148" r="22" fill="#e8f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="620" y="154" text-anchor="middle" fill="#1a1a1a" font-size="18">&#931;</text>

  <line x1="642" y1="148" x2="665" y2="148" stroke="#1565c0" stroke-width="1.4"/>
  <rect x="665" y="130" width="150" height="36" rx="8" fill="#e8f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="740" y="146" text-anchor="middle" fill="#1a1a1a">&#215; gain &#8594; clip</text>
  <text x="740" y="159" text-anchor="middle" fill="#5d5d5d" font-size="10">headroom + soft clip</text>

  <line x1="815" y1="148" x2="845" y2="148" stroke="#1565c0" stroke-width="1.4"/>
  <text x="851" y="152" fill="#1565c0" font-size="11">out</text>

  <!-- ── legend ── -->
  <line x1="40" y1="278" x2="68" y2="278" stroke="#1565c0" stroke-width="1.4"/>
  <text x="73" y="282" fill="#5d5d5d" font-size="10">signal</text>
  <line x1="130" y1="278" x2="158" y2="278" stroke="#43a047" stroke-width="1.4"/>
  <text x="163" y="282" fill="#5d5d5d" font-size="10">control</text>
  <line x1="230" y1="278" x2="258" y2="278" stroke="#d81b60" stroke-width="1.4"/>
  <text x="263" y="282" fill="#5d5d5d" font-size="10">MIDI note</text>

  <!-- baked arrowheads -->
  <polygon points="140,148 131,144 131,152" fill="#d81b60"/>
  <polygon points="340,148 331,144 331,152" fill="#43a047"/>
  <polygon points="598,148 589,144 589,152" fill="#1565c0"/>
  <polygon points="665,148 656,144 656,152" fill="#1565c0"/>
  <polygon points="845,148 836,144 836,152" fill="#1565c0"/>
</svg>
