<svg xmlns="http://www.w3.org/2000/svg" width="760" height="340"
     viewBox="0 0 760 340"
     font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol"' font-size="12">

  <!-- ── output tap labels (top) ── -->
  <text x="200" y="46" text-anchor="middle" fill="#1a1a1a">Highpass</text>
  <text x="385" y="46" text-anchor="middle" fill="#1a1a1a">Bandpass</text>
  <text x="575" y="46" text-anchor="middle" fill="#1a1a1a">Lowpass</text>

  <!-- tap risers -->
  <line x1="200" y1="120" x2="200" y2="58" stroke="#1565c0" stroke-width="1.4"/>
  <line x1="385" y1="120" x2="385" y2="58" stroke="#1565c0" stroke-width="1.4"/>
  <line x1="575" y1="120" x2="575" y2="58" stroke="#1565c0" stroke-width="1.4"/>

  <!-- ── input → summer ── -->
  <text x="6" y="125" fill="#1a1a1a">input</text>
  <line x1="40" y1="120" x2="128" y2="120" stroke="#1a1a1a" stroke-width="1.4"/>

  <!-- summer -->
  <circle cx="150" cy="120" r="22" fill="#e8f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="150" y="127" text-anchor="middle" fill="#1a1a1a" font-size="18">&#931;</text>

  <!-- summer → integrator 1 (this node is the highpass) -->
  <line x1="172" y1="120" x2="230" y2="120" stroke="#1565c0" stroke-width="1.4"/>
  <circle cx="200" cy="120" r="3.5" fill="#1565c0"/>

  <!-- integrator 1 -->
  <rect x="230" y="103" width="120" height="34" rx="8" fill="#e8f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="290" y="119" text-anchor="middle" fill="#1a1a1a">integrator</text>
  <text x="290" y="131" text-anchor="middle" fill="#5d5d5d" font-size="10">gain g</text>

  <!-- integrator 1 → integrator 2 (this node is the bandpass) -->
  <line x1="350" y1="120" x2="420" y2="120" stroke="#1565c0" stroke-width="1.4"/>
  <circle cx="385" cy="120" r="3.5" fill="#1565c0"/>

  <!-- integrator 2 -->
  <rect x="420" y="103" width="120" height="34" rx="8" fill="#e8f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="480" y="119" text-anchor="middle" fill="#1a1a1a">integrator</text>
  <text x="480" y="131" text-anchor="middle" fill="#5d5d5d" font-size="10">gain g</text>

  <!-- integrator 2 → lowpass tap -->
  <line x1="540" y1="120" x2="575" y2="120" stroke="#1565c0" stroke-width="1.4"/>
  <circle cx="575" cy="120" r="3.5" fill="#1565c0"/>

  <!-- ── feedback (amber) ── -->

  <!-- bandpass → damping gain k -->
  <line x1="385" y1="120" x2="385" y2="218" stroke="#b07000" stroke-width="1.4"/>
  <rect x="345" y="218" width="80" height="34" rx="8" fill="#fff8e1" stroke="#b07000" stroke-width="1.5"/>
  <text x="385" y="234" text-anchor="middle" fill="#1a1a1a">&#215; k</text>
  <text x="385" y="246" text-anchor="middle" fill="#5d5d5d" font-size="10">damping</text>

  <!-- k output → feedback bus -->
  <line x1="345" y1="235" x2="150" y2="235" stroke="#b07000" stroke-width="1.4"/>
  <circle cx="150" cy="235" r="3.5" fill="#b07000"/>

  <!-- lowpass → feedback bus -->
  <line x1="575" y1="120" x2="575" y2="295" stroke="#b07000" stroke-width="1.4"/>
  <line x1="575" y1="295" x2="150" y2="295" stroke="#b07000" stroke-width="1.4"/>

  <!-- feedback bus → inverter → summer -->
  <line x1="150" y1="295" x2="150" y2="192" stroke="#b07000" stroke-width="1.4"/>

  <!-- inverting gain: negate the summed feedback before the summer -->
  <polygon points="135,192 165,192 150,162" fill="#fff8e1" stroke="#b07000" stroke-width="1.5"/>
  <text x="150" y="186" text-anchor="middle" fill="#1a1a1a" font-size="11">&#8722;1</text>
  <line x1="150" y1="162" x2="150" y2="142" stroke="#b07000" stroke-width="1.4"/>

  <!-- ── derived taps box (control green) ── -->
  <rect x="612" y="62" width="140" height="86" rx="8" fill="#ffffff" stroke="#43a047" stroke-width="1.5"/>
  <text x="682" y="80" text-anchor="middle" fill="#1a1a1a">Derived taps</text>
  <text x="624" y="100" fill="#1a1a1a" font-size="11">notch = HP + LP</text>
  <text x="624" y="118" fill="#1a1a1a" font-size="11">peak = LP &#8722; HP</text>
  <text x="624" y="136" fill="#1a1a1a" font-size="11">allpass = in &#8722; 2k&#183;BP</text>

  <!-- ── legend + coefficients ── -->
  <line x1="40" y1="322" x2="68" y2="322" stroke="#1565c0" stroke-width="1.4"/>
  <text x="73" y="326" fill="#5d5d5d" font-size="10">signal path</text>
  <line x1="160" y1="322" x2="188" y2="322" stroke="#b07000" stroke-width="1.4"/>
  <text x="193" y="326" fill="#5d5d5d" font-size="10">feedback (damping)</text>
  <text x="560" y="326" fill="#5d5d5d" font-size="10">g = tan(&#960;&#183;fc/fs),  k = 1/Q</text>

  <!-- baked arrowheads -->
  <polygon points="128,120 119,116 119,124" fill="#1a1a1a"/>
  <polygon points="230,120 221,116 221,124" fill="#1565c0"/>
  <polygon points="420,120 411,116 411,124" fill="#1565c0"/>
  <polygon points="200,58 196,67 204,67" fill="#1565c0"/>
  <polygon points="385,58 381,67 389,67" fill="#1565c0"/>
  <polygon points="575,58 571,67 579,67" fill="#1565c0"/>
  <polygon points="385,218 381,209 389,209" fill="#b07000"/>
  <polygon points="150,142 146,151 154,151" fill="#b07000"/>
</svg>
