<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 160"
     font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol"'>

  <!-- connectors (audio path: black), arrowheads baked as polygons -->
  <g stroke="#1a1a1a" stroke-width="2" fill="none">
    <line x1="14"  y1="83" x2="61"  y2="83"/>
    <line x1="270" y1="83" x2="295" y2="83"/>
    <line x1="504" y1="83" x2="529" y2="83"/>
    <line x1="738" y1="83" x2="763" y2="83"/>
    <line x1="972" y1="83" x2="1016" y2="83"/>
  </g>
  <g fill="#1a1a1a">
    <polygon points="70,83 61,78.5 61,87.5"/>
    <polygon points="304,83 295,78.5 295,87.5"/>
    <polygon points="538,83 529,78.5 529,87.5"/>
    <polygon points="772,83 763,78.5 763,87.5"/>
    <polygon points="1025,83 1016,78.5 1016,87.5"/>
  </g>

  <!-- connector labels -->
  <g fill="#5d5d5d" font-size="10" text-anchor="middle" font-style="italic">
    <text x="40"  y="74">samples</text>
    <text x="755" y="74">period</text>
    <text x="998" y="74">frequency</text>
  </g>

  <!-- processing boxes (audio path) -->
  <g>
    <rect x="70"  y="50" width="200" height="66" rx="8" fill="#e8f2fd" stroke="#1565c0" stroke-width="2"/>
    <rect x="304" y="50" width="200" height="66" rx="8" fill="#e8f2fd" stroke="#1565c0" stroke-width="2"/>
    <rect x="538" y="50" width="200" height="66" rx="8" fill="#e8f2fd" stroke="#1565c0" stroke-width="2"/>
    <rect x="772" y="50" width="200" height="66" rx="8" fill="#e8f2fd" stroke="#1565c0" stroke-width="2"/>
  </g>

  <!-- box titles (class names) -->
  <g fill="#1a1a1a" font-size="13" font-weight="600" text-anchor="middle">
    <text x="170" y="80">zero_crossing_collector</text>
    <text x="404" y="80">bitstream_acf</text>
    <text x="638" y="80">bacf_period_detector</text>
    <text x="872" y="80">pitch_detector</text>
  </g>

  <!-- box subtitles -->
  <g fill="#5d5d5d" font-size="10" text-anchor="middle">
    <text x="170" y="99">hysteretic edges + pulses</text>
    <text x="404" y="99">bitset · XOR + popcount</text>
    <text x="638" y="99">sub-collector → fundamental</text>
    <text x="872" y="99">bias + 3-point median</text>
  </g>
</svg>
