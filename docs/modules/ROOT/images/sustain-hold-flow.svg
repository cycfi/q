  <polygon points="56.00,53.00 47.00,57.00 47.00,49.00" fill="#1a1a1a"/>
  <polygon points="216.00,53.00 207.00,57.00 207.00,49.00" fill="#1a1a1a"/>
  <polygon points="398.00,53.00 389.00,57.00 389.00,49.00" fill="#1a1a1a"/>
  <polygon points="558.00,53.00 549.00,57.00 549.00,49.00" fill="#1a1a1a"/>
  <polygon points="706.00,53.00 697.00,57.00 697.00,49.00" fill="#1a1a1a"/>
  <polygon points="118.00,198.00 114.00,189.00 122.00,189.00" fill="#43a047"/>
  <polygon points="216.00,223.00 207.00,227.00 207.00,219.00" fill="#43a047"/>
  <polygon points="374.00,223.00 365.00,227.00 365.00,219.00" fill="#43a047"/>
  <polygon points="540.00,76.00 544.00,85.00 536.00,85.00" fill="#5d5d5d"/>
  <polygon points="300.00,78.00 304.00,87.00 296.00,87.00" fill="#43a047"/>
  <polygon points="289.00,248.00 293.00,257.00 285.00,257.00" fill="#d81b60"/>
