<svg xmlns="http://www.w3.org/2000/svg" width="720" height="330" viewBox="0 0 720 330" font-family="DejaVu Sans, Verdana, sans-serif" font-size="12">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a1a1a"/>
    </marker>
    <marker id="arrow-m" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d81b60"/>
    </marker>
    <marker id="arrow-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#43a047"/>
    </marker>
  </defs>

  <!-- ====================== audio path (top) ====================== -->
  <text x="10" y="58" fill="#1a1a1a">input</text>

  <rect x="58" y="30" width="120" height="46" rx="8" fill="#e8f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="118" y="49" text-anchor="middle" fill="#1a1a1a">ring buffer</text>
  <text x="118" y="66" text-anchor="middle" fill="#5d5d5d" font-size="10">hermite reads</text>

  <rect x="218" y="30" width="142" height="46" rx="8" fill="#e8f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="289" y="49" text-anchor="middle" fill="#1a1a1a">grains ×2, OLA</text>
  <text x="289" y="66" text-anchor="middle" fill="#5d5d5d" font-size="10">width 16P · hop 8P</text>

  <rect x="400" y="30" width="120" height="46" rx="8" fill="#e8f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="460" y="49" text-anchor="middle" fill="#1a1a1a">norm</text>
  <text x="460" y="66" text-anchor="middle" fill="#5d5d5d" font-size="10">RMS table</text>

  <rect x="560" y="30" width="120" height="46" rx="8" fill="#e8f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="620" y="49" text-anchor="middle" fill="#1a1a1a">compressor</text>
  <text x="620" y="66" text-anchor="middle" fill="#5d5d5d" font-size="10">AR side-chain + clip</text>

  <line x1="44" y1="53" x2="56" y2="53" stroke="#1a1a1a" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="178" y1="53" x2="216" y2="53" stroke="#1a1a1a" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="360" y1="53" x2="398" y2="53" stroke="#1a1a1a" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="520" y1="53" x2="558" y2="53" stroke="#1a1a1a" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="680" y1="53" x2="706" y2="53" stroke="#1a1a1a" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="690" y="44" fill="#1a1a1a">out</text>

  <!-- dry path -->
  <path d="M 50 53 L 50 130 L 398 130" fill="none" stroke="#5d5d5d" stroke-width="1.2" stroke-dasharray="5,3"/>
  <rect x="400" y="108" width="120" height="44" rx="8" fill="#ffffff" stroke="#5d5d5d" stroke-width="1.2"/>
  <text x="460" y="126" text-anchor="middle" fill="#1a1a1a">dry handover</text>
  <text x="460" y="142" text-anchor="middle" fill="#5d5d5d" font-size="10">complementary ramp</text>
  <path d="M 520 130 L 540 130 L 540 76" fill="none" stroke="#5d5d5d" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <!-- ====================== control rail (bottom) ====================== -->
  <rect x="58" y="200" width="120" height="46" rx="8" fill="#ffffff" stroke="#43a047" stroke-width="1.5"/>
  <text x="118" y="219" text-anchor="middle" fill="#1a1a1a">envelope</text>
  <text x="118" y="236" text-anchor="middle" fill="#5d5d5d" font-size="10">attack keep-out</text>

  <rect x="218" y="200" width="142" height="46" rx="8" fill="#ffffff" stroke="#43a047" stroke-width="1.5"/>
  <text x="289" y="219" text-anchor="middle" fill="#1a1a1a">best_lag → P</text>
  <text x="289" y="236" text-anchor="middle" fill="#5d5d5d" font-size="10">NCC, sub-sample</text>

  <rect x="376" y="200" width="208" height="46" rx="8" fill="#ffffff" stroke="#43a047" stroke-width="1.5"/>
  <text x="480" y="219" text-anchor="middle" fill="#1a1a1a">scheduler</text>
  <text x="480" y="236" text-anchor="middle" fill="#5d5d5d" font-size="10">period grid · ping-pong region</text>

  <!-- control flow arrows -->
  <line x1="118" y1="78" x2="118" y2="198" stroke="#43a047" stroke-width="1.2" marker-end="url(#arrow-g)"/>
  <line x1="178" y1="223" x2="216" y2="223" stroke="#43a047" stroke-width="1.2" marker-end="url(#arrow-g)"/>
  <line x1="360" y1="223" x2="374" y2="223" stroke="#43a047" stroke-width="1.2" marker-end="url(#arrow-g)"/>
  <line x1="480" y1="198" x2="480" y2="120 " stroke="#43a047" stroke-width="1.2" opacity="0"/>
  <path d="M 480 198 L 480 170 L 300 170 L 300 78" fill="none" stroke="#43a047" stroke-width="1.2" marker-end="url(#arrow-g)"/>

  <!-- SPACE trigger -->
  <rect x="58" y="282" width="120" height="34" rx="17" fill="#fdeaf2" stroke="#d81b60" stroke-width="1.5"/>
  <text x="118" y="303" text-anchor="middle" fill="#d81b60">SPACE</text>
  <path d="M 178 299 L 289 299 L 289 248" fill="none" stroke="#d81b60" stroke-width="1.2" marker-end="url(#arrow-m)"/>
  <text x="200" y="291" fill="#d81b60" font-size="10">hold / release</text>
</svg>
